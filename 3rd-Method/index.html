<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Store Management</title>
    <link
      rel="stylesheet"
      href="style.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="box-red">
        <h3>Total Expense</h3>
        <h2 id="expense">0</h2>
      </div>

      <div class="box-green">
        <h3>Total Income</h3>
        <h2 id="income">0</h2>
      </div>

      <div class="box-blue">
        <h3>Total Profit</h3>
        <h2 id="profit">0</h2>
      </div>
    </div>

    <div class="card">
      <form>
        <label for="itemName"
          >Detail:
          <input
            type="text"
            id="itemName"
            placeholder="Enter Item name"
          />
        </label>
        <label for="amount"
          >Amount:
          <input
            type="number"
            id="amount"
            placeholder="Enter your amount"
            required
          />
        </label>

        <button
          class="buy"
          type="submit"
          onclick="
            getData('buy');
            return false;
          "
        >
          Buy
        </button>

        <button
          class="sell"
          type="submit"
          onclick="
            getData('sell');
            return false;
          "
        >
          Sell
        </button>
      </form>

      <div class="history-card">
        <h3>History</h3>
        <div id="result"></div>
      </div>
    </div>
  </body>
  <script src="app.js"></script>
</html>
