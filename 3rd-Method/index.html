<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stats-container">
        <div class="card expense-card">
            <h3>Total Expense</h3>
            <h2 id="total-expense">0</h2>
        </div>
        <div class="card income-card">
            <h3>Total Income</h3>
            <h2 id="total-income">0</h2>
        </div>
        <div class="card profit-card">
            <h3>Total Profit</h3>
            <h2 id="total-profit">0</h2>
        </div>
    </div>

    <div class="input-group">
        <div class="input-field">
            <label>Details</label>
            <input type="text" id="details" placeholder="Item Name">
        </div>
        <div class="input-field">
            <label>Amount</label>
            <input type="number" id="amount" placeholder="0">
        </div>
        <div class="btn-container">
            <button class="btn-sell" onclick="addTransaction('sell')">Sell</button>
            <button class="btn-buy" onclick="addTransaction('buy')">Buy</button>
        </div>
    </div>

    <div class="history-list" id="history-list">
    </div>
        
    <script src="app.js"></script>
</body>
</html>
